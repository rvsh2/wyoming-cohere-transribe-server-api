services:
  wyoming-transcribe:
    image: wyoming-transcribe:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wyoming-transcribe
    restart: unless-stopped
    ports:
      - "0.0.0.0:10300:10300"
    networks:
      - bridge-network
    volumes:
      - /opt/wyoming-transcribe/data:/root/.cache/huggingface
    environment:
      - HF_HOME=/root/.cache/huggingface
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - NVIDIA_VISIBLE_DEVICES=all
      - VAD_ENABLED=true
      - VAD_THRESHOLD=0.54
      - VAD_MIN_SPEECH_DURATION_MS=180
      - VAD_MIN_SILENCE_DURATION_MS=120
      - VAD_SPEECH_PAD_MS=50
      - VAD_MIN_TOTAL_SPEECH_MS=70
      - VAD_MIN_MAX_SEGMENT_MS=45
      - VAD_MIN_SPEECH_RMS=0.014
      - VAD_MIN_SPEECH_TO_NOISE_RATIO=2.6
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["--uri", "tcp://0.0.0.0:10300", "--language", "pl"]

networks:
  bridge-network:
    external: true
